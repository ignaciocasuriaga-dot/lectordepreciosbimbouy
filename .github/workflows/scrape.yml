name: Scrape Precios Bimbo
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: precios-bimbo
      - run: node scripts/scraper.js
        working-directory: precios-bimbo
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add precios-bimbo/public/data/
          git diff --staged --quiet || git commit -m "actualizar precios $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
